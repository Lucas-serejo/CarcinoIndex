version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./datasets:/datasets
      - ./experiments:/experiments
    environment:
      - ENVIRONMENT=development
    # Comando de inicialização simples rodando uvicorn com reload local
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
